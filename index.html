<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevin Bae</title>
  <link rel="stylesheet" href="output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    main { position: relative; z-index: 1; }

    /* ── Fade-in on load ── */
    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.15s; }
    .delay-3 { animation-delay: 0.28s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ── */
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body class="bg-glass-bg text-text-primary font-sans min-h-screen" style="-webkit-font-smoothing: antialiased;">
  <main class="max-w-[480px] mx-auto px-6 py-[72px]">

    <!-- Hero -->
    <section class="flex items-center gap-[18px] mb-10 fade-in delay-1">
      <div class="avatar"></div>
      <div>
        <h1 class="text-[20px] font-semibold tracking-tight">Kevin Bae</h1>
        <p class="text-[12px] text-text-muted mt-0.5" style="letter-spacing: 0.02em;">Staff Software Engineer</p>
        <div class="flex gap-[14px] mt-2.5">
          <a href="https://linkedin.com/in/kevin-bae15" target="_blank" rel="noopener noreferrer"
             class="text-[13px] text-text-muted hover:text-text-primary transition-colors duration-150">LinkedIn</a>
          <a href="https://github.com/kevinbae15" target="_blank" rel="noopener noreferrer"
             class="text-[13px] text-text-muted hover:text-text-primary transition-colors duration-150">GitHub</a>
          <a href="mailto:kevinbae15@gmail.com"
             class="text-[13px] text-text-muted hover:text-text-primary transition-colors duration-150">Email</a>
        </div>
      </div>
    </section>

    <!-- About and Projects go here in subsequent tasks -->

  </main>
</body>
</html>
